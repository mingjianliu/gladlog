name: test

# Correctness gate: lint, typecheck, the full vitest suite across all
# workspaces, and the headless data-faithfulness check (verify:vision).
# Installer packaging lives in build.yml (manual / tag-triggered) —
# this workflow never builds binaries.

on:
  # **所有分支**都跑,不只是 main。只在 main 上跑的代价实测过一次:回放改版
  # 的截图 diff 与一条 localStorage 状态泄漏的单测,都是合进 main 之后才现形
  # 的(2026-07-20)。功能分支上跑,这类问题在合并前就能看到。
  push:
  # 保留 PR 触发:fork 过来的 PR 不会有 push 事件。
  pull_request:
    branches: [main]
  workflow_dispatch:

# 同一个 ref 上只保留最新一次运行 —— 连续推送时自动取消上一次。
# 放开到全分支后这条是控制 CI 用量的主要手段(frontend-qa 含 Playwright
# 浏览器与 Electron,单次约 4-5 分钟)。main 上不取消:那里每个提交的
# 绿灯都是要留档的结论,不是过程信息。
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (all workspaces)
        run: npm test

      - name: Data-faithfulness (verify:vision)
        run: npm -w @gladlog/desktop run verify:vision

      # 生产打包用 electron-vite build,dev/vitest 都不跑它 —— renderer 值引入
      # main 模块这类问题只有它能抓(v0.0.4 首包双平台实锤)。
      - name: Production bundle (electron-vite build)
        run: npm -w @gladlog/desktop run build

  # 前端质检:视觉回归 + 无障碍。与 test job 并行,不拖慢快反馈。
  # 截图基线是 linux 单源 —— CI 既是生产者(visual-baseline.yml)也是判定者。
  frontend-qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # 浏览器二进制按 Playwright 版本缓存,避免每次 CI 重下
      - name: Playwright version
        id: pw
        run: echo "v=$(npx playwright --version | tr -d ' ')" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.v }}

      - name: Install browsers
        run: npx playwright install --with-deps chromium

      - name: Visual regression + a11y
        run: npm -w @gladlog/desktop run test:visual

      # 拆成两步是为了让构建失败与测试失败在日志里分得开
      - name: Build app bundle
        run: npm -w @gladlog/desktop run build

      # Electron 在无头 CI 里需要虚拟显示
      - name: E2E (three core journeys + cold start)
        run: xvfb-run --auto-servernum npx playwright test -c qa/playwright.config.ts --project=e2e
        working-directory: packages/desktop

      # 失败必须留证:没有 diff 三联图就无法人工裁决
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            packages/desktop/qa/playwright-report/
            packages/desktop/qa/test-results/
          retention-days: 14
